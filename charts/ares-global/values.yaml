namespace: ares-system

image:
  repository: ""   # REQUIRED — set via --set image.repository=<your-registry>/ares-scheduler-global
  tag: latest
  pullPolicy: Always

scheduler:
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  enableCoordinator: true
  enableMetrics: true

etcd:
  enabled: true
  image: quay.io/coreos/etcd:v3.5.13
  storage: 1Gi
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  enabled: true
  image: redis:7-alpine
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

service:
  type: LoadBalancer
  port: 8080

prometheus:
  enabled: true
  image: prom/prometheus:v2.48.0
  port: 9090
  retention: 30d
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: LoadBalancer
    port: 9090

grafana:
  enabled: true
  image: grafana/grafana:10.2.2
  port: 3000
  adminPassword: ""   # REQUIRED — set via --set grafana.adminPassword=<your-password>
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  service:
    type: LoadBalancer
    port: 3000
