{{- if .Values.etcd.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
  namespace: {{ .Values.namespace }}
  labels:
    app: etcd
    {{- include "ares-global.labels" . | nindent 4 }}
spec:
  serviceName: etcd-headless
  replicas: 1
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
        - name: etcd
          image: {{ .Values.etcd.image }}
          ports:
            - containerPort: 2379
              name: client
            - containerPort: 2380
              name: peer
          env:
            - name: ETCD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ETCD_DATA_DIR
              value: "/var/run/etcd"
            - name: ETCD_LISTEN_CLIENT_URLS
              value: "http://0.0.0.0:2379"
            - name: ETCD_ADVERTISE_CLIENT_URLS
              value: "http://$(ETCD_NAME).etcd-headless.{{ .Values.namespace }}.svc.cluster.local:2379"
            - name: ETCD_LISTEN_PEER_URLS
              value: "http://0.0.0.0:2380"
            - name: ETCD_INITIAL_ADVERTISE_PEER_URLS
              value: "http://$(ETCD_NAME).etcd-headless.{{ .Values.namespace }}.svc.cluster.local:2380"
            - name: ETCD_INITIAL_CLUSTER
              value: "etcd-0=http://etcd-0.etcd-headless.{{ .Values.namespace }}.svc.cluster.local:2380"
            - name: ETCD_INITIAL_CLUSTER_STATE
              value: "new"
            - name: ETCD_INITIAL_CLUSTER_TOKEN
              value: "ares-etcd-cluster"
            - name: ETCD_LOG_LEVEL
              value: "info"
            - name: ETCDCTL_API
              value: "3"
          volumeMounts:
            - name: etcd-data
              mountPath: /var/run/etcd
          resources:
            requests:
              memory: {{ .Values.etcd.resources.requests.memory | quote }}
              cpu: {{ .Values.etcd.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.etcd.resources.limits.memory | quote }}
              cpu: {{ .Values.etcd.resources.limits.cpu | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: 2379
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 2379
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: etcd-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.etcd.storage }}
{{- end }}
