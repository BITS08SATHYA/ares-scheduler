{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.namespace }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'ares-production'
        monitor: 'ares-prometheus'

    scrape_configs:
      - job_name: 'ares-global-scheduler'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Values.namespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: ares-global
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: instance
          - source_labels: [__meta_kubernetes_pod_label_cluster_id]
            target_label: cluster_id
        metrics_path: '/metrics'

      - job_name: 'ares-local-schedulers'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Values.namespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: ares-local
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: instance
          - source_labels: [__meta_kubernetes_pod_label_cluster_id]
            target_label: cluster_id
        metrics_path: '/metrics'

      - job_name: 'ares-redis'
        static_configs:
          - targets: ['redis-external:6379']
        metrics_path: '/metrics'

      - job_name: 'ares-etcd'
        static_configs:
          - targets: ['etcd-client:2379']
        metrics_path: '/metrics'

      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
{{- end }}
