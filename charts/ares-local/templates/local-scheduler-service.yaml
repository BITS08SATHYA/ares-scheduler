apiVersion: v1
kind: Service
metadata:
  name: ares-local-external
  namespace: {{ .Values.namespace }}
  labels:
    app: ares-local
    {{- include "ares-local.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.scheduler.port }}
      name: http
      protocol: TCP
  selector:
    app: ares-local
