run:
  timeout: 5m
  build-tags:
    - integration

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive

issues:
  exclude-dirs:
    - tests/integration
    - bin
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - revive

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: true
  misspell:
    locale: US
