apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-ds
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-ds
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      priorityClassName: system-node-critical
      containers:
        - name: nvidia-device-plugin-ctr
          image: nvcr.io/nvidia/k8s-device-plugin:v0.17.0
          securityContext:
            privileged: true
          env:
            - name: FAIL_ON_INIT_ERROR
              value: "false"
            - name: PASS_DEVICE_SPECS
              value: "true"
            - name: DEVICE_LIST_STRATEGY
              value: "envvar"
            - name: LD_LIBRARY_PATH
              value: "/opt/nvidia/lib"
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: libnvidia-ml
              mountPath: /opt/nvidia/lib/libnvidia-ml.so.1
              readOnly: true
            - name: libnvidia-ml-full
              mountPath: /opt/nvidia/lib/libnvidia-ml.so.580.105.08
              readOnly: true
            - name: dev-nvidia0
              mountPath: /dev/nvidia0
            - name: dev-nvidiactl
              mountPath: /dev/nvidiactl
            - name: dev-nvidia-uvm
              mountPath: /dev/nvidia-uvm
            - name: dev-nvidia-uvm-tools
              mountPath: /dev/nvidia-uvm-tools
            - name: dev-nvidia-modeset
              mountPath: /dev/nvidia-modeset
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/snap/microk8s/common/var/lib/kubelet/device-plugins
        - name: libnvidia-ml
          hostPath:
            path: /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1
            type: File
        - name: libnvidia-ml-full
          hostPath:
            path: /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.580.105.08
            type: File
        - name: dev-nvidia0
          hostPath:
            path: /dev/nvidia0
            type: CharDevice
        - name: dev-nvidiactl
          hostPath:
            path: /dev/nvidiactl
            type: CharDevice
        - name: dev-nvidia-uvm
          hostPath:
            path: /dev/nvidia-uvm
            type: CharDevice
        - name: dev-nvidia-uvm-tools
          hostPath:
            path: /dev/nvidia-uvm-tools
            type: CharDevice
        - name: dev-nvidia-modeset
          hostPath:
            path: /dev/nvidia-modeset
            type: CharDevice
